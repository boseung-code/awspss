<svg xmlns="http://www.w3.org/2000/svg" width="620" height="580" viewBox="0 0 620 580">
  <defs>
    <style>
      text {
        font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, Consolas, monospace;
        font-size: 14px;
      }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="620" height="580" rx="8" fill="#1e1e2e"/>
  <rect width="620" height="32" rx="8" fill="#313244"/>
  <rect x="0" y="24" width="620" height="8" fill="#313244"/>

  <!-- Window buttons -->
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>

  <!-- Title -->
  <text x="310.0" y="20" fill="#6c7086" font-family="SF Mono, Cascadia Code, Fira Code, Menlo, Consolas, monospace" font-size="12" text-anchor="middle">awspss</text>

  <!-- Content -->
  <!-- sw command -->
  <text x="16" y="48" fill="#89b4fa" font-weight="normal">$ </text><text x="32.8" y="48" fill="#cdd6f4" font-weight="normal">awspss sw</text>
  <text x="16.0" y="68" fill="#6c7086" font-weight="normal">Using cached token.</text>

  <text x="16.0" y="98" fill="#89dceb" font-weight="bold">Select AWS Account:</text>
  <text x="16" y="118" fill="#a6e3a1" font-weight="bold">&gt; </text><text x="32.8" y="118" fill="#a6e3a1" font-weight="bold">production (111122223333)</text>
  <text x="16" y="138" fill="#cdd6f4" font-weight="normal">  </text><text x="32.8" y="138" fill="#cdd6f4" font-weight="normal">staging (444455556666)</text>
  <text x="16" y="158" fill="#cdd6f4" font-weight="normal">  </text><text x="32.8" y="158" fill="#cdd6f4" font-weight="normal">development (777788889999)</text>
  <text x="16" y="178" fill="#cdd6f4" font-weight="normal">  </text><text x="32.8" y="178" fill="#cdd6f4" font-weight="normal">shared-services (000011112222)</text>

  <text x="16.0" y="208" fill="#89dceb" font-weight="bold">[production] Select Permission Set:</text>
  <text x="16" y="228" fill="#a6e3a1" font-weight="bold">&gt; </text><text x="32.8" y="228" fill="#a6e3a1" font-weight="bold">AdministratorAccess</text>
  <text x="16" y="248" fill="#cdd6f4" font-weight="normal">  </text><text x="32.8" y="248" fill="#cdd6f4" font-weight="normal">ReadOnlyAccess</text>
  <text x="16" y="268" fill="#cdd6f4" font-weight="normal">  </text><text x="32.8" y="268" fill="#cdd6f4" font-weight="normal">PowerUserAccess</text>

  <text x="16.0" y="298" fill="#6c7086" font-weight="normal">Fetching credentials for production (111122223333) / AdministratorAccess...</text>
  <text x="16.0" y="318" fill="#a6e3a1" font-weight="bold">Credentials set.</text>
  <text x="16.0" y="338" fill="#6c7086" font-weight="normal">Credentials expire at 18:30 KST.</text>

  <!-- Quick switch with tab completion -->
  <text x="16" y="368" fill="#89b4fa" font-weight="normal">$ </text><text x="32.8" y="368" fill="#cdd6f4" font-weight="normal">awspss sw ReadOnlyAccess</text>
  <text x="16.0" y="388" fill="#6c7086" font-weight="normal">Using cached token.</text>
  <text x="16.0" y="408" fill="#6c7086" font-weight="normal">Fetching credentials for production (111122223333) / ReadOnlyAccess...</text>
  <text x="16.0" y="428" fill="#a6e3a1" font-weight="bold">Credentials set.</text>
  <text x="16.0" y="448" fill="#6c7086" font-weight="normal">Credentials expire at 18:30 KST.</text>

  <!-- whoami -->
  <text x="16" y="478" fill="#89b4fa" font-weight="normal">$ </text><text x="32.8" y="478" fill="#cdd6f4" font-weight="normal">awspss whoami</text>
  <text x="16.0" y="498" fill="#cdd6f4" font-weight="normal">Account:  111122223333</text>
  <text x="16.0" y="518" fill="#cdd6f4" font-weight="normal">Arn:      arn:aws:sts::111122223333:assumed-role/AWSReservedSSO_.../user</text>
  <text x="16.0" y="538" fill="#cdd6f4" font-weight="normal">UserId:   AROA...:user</text>

  <!-- logout -->
  <text x="16" y="568" fill="#89b4fa" font-weight="normal">$ </text><text x="32.8" y="568" fill="#cdd6f4" font-weight="normal">awspss logout</text>
</svg>
